@if (loading()) {
<p>A carregar chegadas...</p>
} @else if (arrivals().length === 0) {
<p>Sem chegadas previstas.</p>
} @else {
<ul>
	@for (arrival of arrivalsWithMinutes(); track arrival.tripId) {
	<li>
		{{ arrival.lineName }} — {{ arrival.minutesUntilArrival }} min ({{
		arrival.arrivalTime
		}}h)
	</li>
	}
</ul>
}
