<div class="relative mb-8">
	<svg lucideSearch class="pointer-events-none absolute top-1/2 left-2.5 size-4 -translate-y-1/2 text-muted-foreground"></svg>
	<input hlmInput type="search" placeholder="Pesquisar linha por nome ou número..." [value]="query()"
		(input)="onQueryChange($any($event.target).value)" class="pl-8" />
</div>

@if (loading()) {
<ul aria-busy="true" aria-label="A carregar linhas..." class="flex flex-col gap-2">
	@for (i of [1, 2, 3, 4, 5]; track i) {
	<li>
		<div hlmSkeleton class="h-9 w-full"></div>
	</li>
	}
</ul>
} @else {
<ul>
	@for (line of sortedLines(); track line.id) {
	<li class="mb-2">
		<button hlmBtn type="button" variant="outline"
			class="h-auto w-full cursor-pointer items-start justify-between gap-2 whitespace-normal py-2 sm:items-center"
			[routerLink]="['/lines', line.id]">
			<span class="flex flex-col items-start gap-1 sm:flex-row sm:items-center sm:gap-2">
				<span class="inline-flex w-fit items-center justify-center rounded px-2 py-1 text-sm font-bold"
					[style.background]="line.color" [style.color]="line.textColor">
					{{ line.shortName }}
				</span>
				<span class="text-left wrap-break-word">{{ line.longName }}</span>
			</span>
			<svg lucideArrowRight class="size-4 shrink-0"></svg>
		</button>
	</li>
	}
</ul>
}
