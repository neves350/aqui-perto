<input hlmInput type="search" placeholder="Pesquisar linha por nome ou número..." [value]="query()"
	(input)="onQueryChange($any($event.target).value)" class="mb-8" />

@if (loading()) {
<ul aria-busy="true" aria-label="A carregar linhas..." class="flex flex-col gap-2">
	@for (i of [1, 2, 3, 4, 5]; track i) {
	<li>
		<div hlmSkeleton class="h-9 w-full"></div>
	</li>
	}
</ul>
} @else {
<ul>
	@for (line of sortedLines(); track line.id) {
	<li class="mb-1">
		<button hlmBtn type="button" variant="ghost" class="cursor-pointer" [routerLink]="['/lines', line.id]">
			<span class="inline-flex items-center justify-center rounded px-2 py-1 text-sm font-bold"
				[style.background]="line.color" [style.color]="line.textColor">
				{{ line.shortName }}
			</span>
			<span>{{ line.longName }}</span>
		</button>
	</li>
	}
</ul>
}
